name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    name: node -c syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm
      - name: install (no scripts, no audit)
        # --ignore-scripts skips bcrypt's node-gyp build attempt - we don't
        # actually run anything that needs the native binding, only require()
        # for syntax checking.
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: syntax check every .js under src/
        # node -c parses the file but does not execute it. Catches typos and
        # accidental top-level breakage without needing a Discord bot token.
        run: |
          set -euo pipefail
          find src -name '*.js' -type f | while read -r f; do
            node -c "$f"
          done

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm
      - name: audit runtime deps
        # --audit-level=high gates CI on HIGH + CRITICAL findings. MODERATE
        # is logged but does not fail. Adjust to "moderate" if we want to
        # block on the next discord.js undici chain bump for a known issue.
        # --omit=dev skips devDependencies (we have none yet but reserve).
        run: npm audit --audit-level=high --omit=dev
